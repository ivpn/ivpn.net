version: '3.8'
services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENV: staging
      no_cache: true
    image: website:latest
    platform: linux/amd64
    ports:
      - "8010:80"
    stdin_open: true
    tty: true

  website-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        ENV: development
      no_cache: true
    image: website-dev:latest
    platform: linux/amd64
    command: >
      /bin/sh -c "
      npm --prefix ./src/themes/ivpn-v3 install &&
      ./src/themes/ivpn-v3/node_modules/.bin/esbuild \
        $(node -e \"require('glob').sync('/opt/build/src/themes/ivpn-v3/**/*.{js,ts,css}').forEach(f=>console.log(f))\") \
        --bundle \
        --outdir=/opt/build/src/static \
        --watch=forever &
      hugo server -s /opt/build/src --bind 0.0.0.0 --baseURL http://localhost:8010 --disableFastRender -D
      "
    ports:
      - "8010:1313"   # Hugo live reload
    volumes:
      - ./src:/opt/build/src:delegated
      - node_modules:/opt/build/src/themes/ivpn-v3/node_modules
    environment:
      - ENV=development
      - NODE_ENV=development
    stdin_open: true
    tty: true

volumes:
  node_modules:
